<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Main glow -->
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#00AACC" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D3A5C"/>
      <stop offset="40%" stop-color="#0A4A6E"/>
      <stop offset="100%" stop-color="#062030"/>
    </linearGradient>
    <!-- Shield border gradient -->
    <linearGradient id="shieldBorder" x1="0%" y1="0%" x2="100%" y2="120%">
      <stop offset="0%" stop-color="#00FFFF"/>
      <stop offset="40%" stop-color="#00D9FF"/>
      <stop offset="100%" stop-color="#0066AA"/>
    </linearGradient>
    <!-- Lock gradient -->
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFFF"/>
      <stop offset="100%" stop-color="#00A0CC"/>
    </linearGradient>
    <!-- Circuit line gradient -->
    <linearGradient id="circuitGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00D9FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0"/>
    </linearGradient>
    <!-- Inner shield shine -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow1" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="shieldClip">
      <path d="M100 12 L172 42 L172 105 Q172 155 100 188 Q28 155 28 105 L28 42 Z"/>
    </clipPath>
  </defs>

  <!-- Outer ambient glow -->
  <circle cx="100" cy="100" r="96" fill="url(#outerGlow)"/>

  <!-- Rotating orbit rings -->
  <circle cx="100" cy="100" r="91" fill="none" stroke="#00D9FF" stroke-width="0.4" stroke-opacity="0.2" stroke-dasharray="4 8"/>
  <circle cx="100" cy="100" r="83" fill="none" stroke="#00FFFF" stroke-width="0.3" stroke-opacity="0.15" stroke-dasharray="2 12"/>

  <!-- Corner node dots on outer ring -->
  <circle cx="100" cy="9" r="2.5" fill="#00D9FF" opacity="0.7" filter="url(#softGlow)"/>
  <circle cx="176" cy="51" r="2" fill="#00D9FF" opacity="0.5"/>
  <circle cx="176" cy="149" r="2" fill="#00D9FF" opacity="0.5"/>
  <circle cx="100" cy="191" r="2.5" fill="#00D9FF" opacity="0.7" filter="url(#softGlow)"/>
  <circle cx="24" cy="149" r="2" fill="#00D9FF" opacity="0.5"/>
  <circle cx="24" cy="51" r="2" fill="#00D9FF" opacity="0.5"/>

  <!-- Main shield body -->
  <path d="M100 14 L170 43 L170 106 Q170 153 100 186 Q30 153 30 106 L30 43 Z"
    fill="url(#shieldGrad)"
    stroke="url(#shieldBorder)" stroke-width="2.5"
    filter="url(#glow1)"/>

  <!-- Shield inner shine -->
  <path d="M100 14 L170 43 L170 106 Q170 153 100 186 Q30 153 30 106 L30 43 Z"
    fill="url(#shineGrad)" clip-path="url(#shieldClip)"/>

  <!-- Shield inner border (double border effect) -->
  <path d="M100 22 L162 48 L162 106 Q162 148 100 178 Q38 148 38 106 L38 48 Z"
    fill="none" stroke="#00D9FF" stroke-width="0.8" stroke-opacity="0.25"/>

  <!-- Circuit decoration lines inside shield -->
  <line x1="50" y1="75" x2="70" y2="75" stroke="#00D9FF" stroke-width="0.8" stroke-opacity="0.35"/>
  <line x1="50" y1="75" x2="50" y2="90" stroke="#00D9FF" stroke-width="0.8" stroke-opacity="0.35"/>
  <circle cx="50" cy="90" r="1.5" fill="#00D9FF" opacity="0.5"/>

  <line x1="150" y1="75" x2="130" y2="75" stroke="#00D9FF" stroke-width="0.8" stroke-opacity="0.35"/>
  <line x1="150" y1="75" x2="150" y2="90" stroke="#00D9FF" stroke-width="0.8" stroke-opacity="0.35"/>
  <circle cx="150" cy="90" r="1.5" fill="#00D9FF" opacity="0.5"/>

  <line x1="55" y1="145" x2="72" y2="145" stroke="#00D9FF" stroke-width="0.8" stroke-opacity="0.25"/>
  <line x1="145" y1="145" x2="128" y2="145" stroke="#00D9FF" stroke-width="0.8" stroke-opacity="0.25"/>

  <!-- LOCK BODY - professional proportions -->
  <!-- Lock shackle (arc top) -->
  <path d="M76 98 L76 80 Q76 58 100 58 Q124 58 124 80 L124 98"
    fill="none"
    stroke="url(#lockGrad)" stroke-width="10"
    stroke-linecap="round"
    filter="url(#glow1)"/>

  <!-- Lock body rectangle -->
  <rect x="64" y="96" width="72" height="54" rx="10" ry="10"
    fill="url(#lockGrad)"
    filter="url(#glow1)"/>

  <!-- Lock body inner shadow -->
  <rect x="64" y="96" width="72" height="54" rx="10" ry="10"
    fill="none" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.2"/>

  <!-- Keyhole circle -->
  <circle cx="100" cy="117" r="9"
    fill="#062030"
    filter="url(#softGlow)"/>
  <circle cx="100" cy="117" r="9"
    fill="none" stroke="#00AACC" stroke-width="1" stroke-opacity="0.6"/>

  <!-- Keyhole slot -->
  <rect x="96" y="117" width="8" height="14" rx="3"
    fill="#062030"/>

  <!-- Keyhole shine dot -->
  <circle cx="97" cy="114" r="2" fill="#00FFFF" opacity="0.4"/>

  <!-- Lock top highlight shine -->
  <path d="M76 98 L76 86 Q76 66 100 66 Q115 66 122 78"
    fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.15" stroke-linecap="round"/>

  <!-- Small data dots (security feel) -->
  <circle cx="100" cy="48" r="1.8" fill="#00FFFF" opacity="0.6" filter="url(#softGlow)"/>
  <circle cx="86" cy="52" r="1.2" fill="#00D9FF" opacity="0.4"/>
  <circle cx="114" cy="52" r="1.2" fill="#00D9FF" opacity="0.4"/>

  <!-- Bottom shield glow line -->
  <path d="M60 170 Q100 185 140 170"
    fill="none" stroke="#00D9FF" stroke-width="1" stroke-opacity="0.3"
    filter="url(#softGlow)"/>

</svg>