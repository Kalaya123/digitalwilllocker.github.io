<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Cancelled - Digital Will Locker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:linear-gradient(180deg,#0A2540,#0D3A5C);
  min-height:100vh;display:flex;
  align-items:center;justify-content:center;
  font-family:Arial,sans-serif;color:#fff;
}
.box{
  text-align:center;padding:50px 40px;
  background:rgba(13,58,92,0.8);
  border:1px solid rgba(255,100,100,0.3);
  border-radius:24px;max-width:400px;width:90%;
}
.icon{font-size:4rem;margin-bottom:20px;}
h1{font-size:1.8rem;color:#FF6464;margin-bottom:12px;}
p{color:#94A3B8;line-height:1.7;margin-bottom:24px;}
.btn{
  display:inline-block;
  background:linear-gradient(135deg,#00D9FF,#00FFFF);
  color:#001D3D;padding:12px 30px;
  border-radius:20px;text-decoration:none;
  font-weight:700;font-size:.9rem;
}
</style>
</head>
<body>
<div class="box">
  <div class="icon">❌</div>
  <h1>Payment Cancelled</h1>
  <p>Your payment was cancelled. No charges were made to your account.</p>
  <p>Please go back to the app if you want to try again.</p>
  <a href="digitalwilllocker://paypal/cancel" class="btn">Back to App</a>
</div>
</body>
</html>
