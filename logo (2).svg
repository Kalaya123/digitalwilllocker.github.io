<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="glowBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#00FFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00D9FF" stop-opacity="0.85"/>
      <stop offset="50%"  stop-color="#00FFFF" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#9D00FF" stop-opacity="0.75"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sg" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Radial glow bg -->
  <circle cx="100" cy="100" r="90" fill="url(#glowBg)"/>

  <!-- 3 orbit rings - cyan, electric, purple -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#00D9FF" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="3 6"/>
  <circle cx="100" cy="100" r="72" fill="none" stroke="#00FFFF" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="2 8"/>
  <circle cx="100" cy="100" r="56" fill="none" stroke="#9D00FF" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="4 4"/>

  <!-- Orbit dots -->
  <circle cx="100" cy="12"  r="3"   fill="#00FFFF" opacity="0.8" filter="url(#sg)"/>
  <circle cx="176" cy="56"  r="2.5" fill="#00D9FF" opacity="0.7"/>
  <circle cx="176" cy="144" r="2"   fill="#9D00FF" opacity="0.6"/>
  <circle cx="100" cy="188" r="3"   fill="#00FFFF" opacity="0.8" filter="url(#sg)"/>
  <circle cx="24"  cy="144" r="2.5" fill="#00D9FF" opacity="0.7"/>
  <circle cx="24"  cy="56"  r="2"   fill="#9D00FF" opacity="0.6"/>

  <!-- Hexagon fill -->
  <path d="M 100.0,48.0 L 145.0,74.0 L 145.0,126.0 L 100.0,152.0 L 55.0,126.0 L 55.0,74.0 Z" fill="url(#hexGrad)" filter="url(#glow)"/>
  <!-- Hexagon white stroke -->
  <path d="M 100.0,48.0 L 145.0,74.0 L 145.0,126.0 L 100.0,152.0 L 55.0,126.0 L 55.0,74.0 Z" fill="none" stroke="white" stroke-width="2.5" stroke-opacity="0.92"/>

  <!-- Lock body - white rounded rect -->
  <rect x="81" y="92" width="38" height="27" rx="5" ry="5" fill="white" opacity="0.95" filter="url(#sg)"/>

  <!-- Lock shackle - white semicircle arc on top -->
  <path d="M 86 92 L 86 79 Q 86 65 100 65 Q 114 65 114 79 L 114 92"
    fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round" opacity="0.95" filter="url(#sg)"/>

  <!-- Cyan keyhole dot -->
  <circle cx="100" cy="102" r="5" fill="#00D9FF" filter="url(#sg)"/>
  <!-- Keyhole slot -->
  <rect x="97.5" y="103" width="5" height="10" rx="2.5" fill="#00D9FF" opacity="0.8"/>

  <style>
    svg { animation: p 2.5s ease-in-out infinite; }
    @keyframes p {
      0%,100% { filter: drop-shadow(0 0 14px #00D9FF); }
      50%      { filter: drop-shadow(0 0 30px #00FFFF); }
    }
  </style>
</svg>